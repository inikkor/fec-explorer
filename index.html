<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEC PAC Contributions Explorer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --bg-color: #f8fafc; --surface-color: #ffffff; --border-color: #e2e8f0; --text-main: #1e293b; --accent-color: #2563eb; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .controls { background: var(--surface-color); padding: 20px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .control-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .control-group { flex: 1; min-width: 180px; display: flex; flex-direction: column; }
        select, button { padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); }
        button { background-color: var(--accent-color); color: white; font-weight: 600; cursor: pointer; }
        #status { padding: 10px; margin-bottom: 10px; border-radius: 6px; display: none; background: #fff; }
        .viz-container { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; justify-content: center; }
        .chamber-viz { flex: 1; min-width: 450px; background: white; padding: 20px; border-radius: 10px; border: 1px solid var(--border-color); text-align: center; }
        .table-container { background: white; border-radius: 10px; border: 1px solid var(--border-color); overflow: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>Campaign Finance Explorer</h1>
    <div class="controls">
        <div class="control-row">
            <div class="control-group">
                <label>View Mode</label>
                <select id="viewMode">
                    <option value="raw">1. Raw Transactions</option>
                    <option value="aggregate" selected>2. Aggregated Leaderboard</option>
                </select>
            </div>
            <div class="control-group">
                <label>State</label>
                <select id="stateSelect"><option value="">All States</option></select>
            </div>
            <button onclick="fetchData()" id="loadBtn">Load Data</button>
        </div>
    </div>

    <div id="status"></div>
    <div class="viz-container" id="vizContainer">
        <div class="chamber-viz"><h2>House</h2><div id="houseChart"></div></div>
        <div class="chamber-viz"><h2>Senate</h2><div id="senateChart"></div></div>
    </div>

    <div class="table-container">
        <table id="resultsTable"><tbody id="resultsBody"></tbody></table>
    </div>
</div>

<script>
    async function fetchData() {
        const status = document.getElementById('status');
        status.style.display = 'block'; status.innerText = 'Loading data...';
        
        try {
            const [legRes, fecRes] = await Promise.all([
                fetch('https://unitedstates.github.io/congress-legislators/legislators-current.json'),
                fetch('fec_data.json?t=' + Date.now())
            ]);
            
            const legislators = await legRes.json();
            const transactions = await fecRes.json();
            
            const idMap = {};
            legislators.forEach(leg => {
                (leg.id.fec || []).forEach(fecId => {
                    idMap[fecId] = { 
                        name: leg.name.official_full,
                        type: leg.terms.slice(-1)[0].type,
                        state: leg.terms.slice(-1)[0].state 
                    };
                });
            });

            const stateFilter = document.getElementById('stateSelect').value;
            const viewMode = document.getElementById('viewMode').value;
            
            const filtered = transactions.filter(t => !stateFilter || idMap[t.candidate_id]?.state === stateFilter);

            document.getElementById('vizContainer').style.display = viewMode === 'aggregate' ? 'flex' : 'none';
            const body = document.getElementById('resultsBody');
            
            if (viewMode === 'raw') {
                body.innerHTML = filtered.map(r => `<tr><td>${r.disbursement_date}</td><td>${r.recipient_name}</td><td>$${parseFloat(r.disbursement_amount).toLocaleString()}</td></tr>`).join('');
                status.innerText = `Displaying ${filtered.length} transactions.`;
            } else {
                status.innerText = `Aggregated ${filtered.length} records. Rendering visualization...`;
                renderCharts(filtered, idMap);
            }
        } catch (e) {
            status.innerText = 'Error: ' + e.message;
        }
    }

    function renderCharts(data, idMap) {
        const houseData = [], senateData = [];
        const seen = new Set();
        
        data.forEach(t => {
            const info = idMap[t.candidate_id];
            if (info && !seen.has(t.candidate_id)) {
                seen.add(t.candidate_id);
                if (info.type === 'sen') senateData.push(info); else houseData.push(info);
            }
        });

        drawParliament("#houseChart", houseData, 450, 250);
        drawParliament("#senateChart", senateData, 450, 250);
    }

    function drawParliament(containerId, data, width, height) {
        const svg = d3.select(containerId).html("").append("svg")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .style("width", "100%");
            
        svg.selectAll("circle")
            .data(data)
            .enter().append("circle")
            .attr("cx", (d, i) => (i * 20) % width)
            .attr("cy", (d, i) => Math.floor(i * 20 / width) * 20 + 50)
            .attr("r", 8)
            .attr("fill", "#2563eb")
            .append("title").text(d => d.name);
    }

    const states = ["AK","AL","AR","AZ","CA","CO","CT","DC","DE","FL","GA","HI","IA","ID","IL","IN","KS","KY","LA","MA","MD","ME","MI","MN","MO","MS","MT","NC","ND","NE","NH","NJ","NM","NV","NY","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VA","VT","WA","WI","WV","WY"];
    const s = document.getElementById('stateSelect');
    states.forEach(st => s.innerHTML += `<option value="${st}">${st}</option>`);
</script>
</body>
</html>
