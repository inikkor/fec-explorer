name: Nightly FEC Data Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run FEC Extraction Script
      env:
        FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
      run: python update_fec_data.py

    - name: Commit and Push Updated Data
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add fec_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update FEC data" && git push)
