name: Daily Data Update
on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight
  workflow_dispatch:
    inputs:
      run_roster:
        description: 'Update Roster (members.json)'
        type: boolean
        default: false
      run_fec:
        description: 'Update FEC Data (fec_data.json)'
        type: boolean
        default: true # Set to false so it doesn't run by default manually

jobs:
  update-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests urllib3

      # Runs if scheduled OR if you checked the "Update Roster" box
      - name: Fetch Current Roster
        if: github.event_name == 'schedule' || inputs.run_roster == true
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python get_rosters.py

      # Runs if scheduled OR if you checked the "Update FEC" box
      - name: Run FEC Extraction Script
        if: github.event_name == 'schedule' || inputs.run_fec == true
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python update_fec_data.py

      - name: Commit and Push Data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Data update" || echo "No changes to commit"
          git config pull.rebase true
          git pull origin main -X ours
          git push
