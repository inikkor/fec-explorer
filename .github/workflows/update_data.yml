name: Daily Data Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight

jobs:
  update-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install --upgrade pip

      # Job 1: Fetch Current Congress Roster
      - name: Fetch Current Roster
        run: python get_rosters.py

      # Job 2: Run FEC Extraction Script
      - name: Run FEC Extraction Script
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python update_fec_data.py

      # Final: Push both files back to the repo
      - name: Commit and Push Data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add members.json fec_data.json
          git commit -m "Daily update: Roster and FEC Data" || echo "No changes to commit"
          git push
